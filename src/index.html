<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDV Static Prototype</title>
  <style>
    :root { --bg:#0b1220; --card:#121a2b; --text:#e7eefc; --muted:#9fb0d0; --accent:#5aa0ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, Segoe UI, Arial, sans-serif; background:linear-gradient(180deg,#0b1220,#0f172a); color:var(--text); }
    .wrap { max-width: 980px; margin: 48px auto; padding: 0 20px; }
    h1 { margin:0 0 10px; font-size: 2rem; }
    p { margin:0 0 28px; color:var(--muted); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid #1f2a44; border-radius:14px; padding:18px; display:flex; gap:12px; align-items:center; }
    .icon { width:40px; height:40px; border-radius:10px; display:grid; place-items:center; background:#0f213f; color:#8bbcff; }
    .label { font-weight:600; }
    .sub { color:var(--muted); font-size:.92rem; margin-top:2px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Prototype UI</h1>
    <p>Oldschool-Logos wurden auf moderne, einheitliche Icons umgestellt.</p>

    <section class="grid">
      <article class="card">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="18" cy="17" r="2.5"/></svg>
        </div>
        <div><div class="label">Dashboard</div><div class="sub">Klarere Navigation</div></div>
      </article>

      <article class="card">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16v12H4z"/><path d="M8 10h8M8 14h5"/></svg>
        </div>
        <div><div class="label">Content</div><div class="sub">Modernisierte Assets</div></div>
      </article>

      <article class="card">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div><div class="label">Security</div><div class="sub">Saubere Icon-Sprache</div></div>
      </article>
    </section>
  </main>
</body>
</html>
